server {
        server_name fredima.de www.fredima.de;
        root /var/www/fredima.de/;
        index public/index.html;
        error_page 404 /error/404.html;
        #auth_basic           "fredima's site";
        #auth_basic_user_file htpasswd;
        location / {
                try_files $uri $uri/ =404;
        }
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/codeways.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/codeways.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}
server {
    if ($host = www.fredima.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = fredima.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


        server_name fredima.de www.fredima.de;
    listen 80;
    return 404; # managed by Certbot
}