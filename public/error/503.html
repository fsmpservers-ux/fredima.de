<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>503 - Service Unavailable | fredima.de</title>
    <link rel="stylesheet" href="/style/styles.css">
</head>
<body>
    <div class="background"></div>
    <div class="grid"></div>

    <div class="container">
        <div class="error-animation">
            <div class="floating-object">🔧</div>
            <div class="floating-object">⚙️</div>
            <div class="floating-object">🔧</div>
        </div>

        <div class="error-code">503</div>
        
        <h1 class="error-title">Service Unavailable</h1>
        
        <p class="error-description">
            The server is temporarily unable to handle your request 
            due to maintenance or capacity problems. Please try again later.
        </p>

        <div class="error-actions">
            <a href="/" class="btn btn-home">Back to Home</a>
        </div>

        <div class="footer-text">
            Error 503 - Service Unavailable
        </div>
    </div>
</body>
</html>
